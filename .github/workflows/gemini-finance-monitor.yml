name: Gemini 금융규정 모니터링

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 패키지 설치
        run: pip install google-generativeai

      - name: Gemini API 호출 및 Issue 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/gemini_report.py
