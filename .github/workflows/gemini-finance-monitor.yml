name: Gemini 금융규정 모니터링

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 패키지 설치
        run: pip install google-genai requests

      - name: Gemini API 호출 및 Issue 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FSS_AUTH_KEY: ${{ secrets.FSS_AUTH_KEY }}
        run: python3 scripts/gemini_report.py

      - name: 리포트 내용 읽기
        id: report
        run: |
          TITLE=$(cat /tmp/report_title.txt)
          BODY=$(cat /tmp/report_body.txt)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          {
            echo "body<<REPORT_EOF"
            echo "$BODY"
            echo "REPORT_EOF"
          } >> $GITHUB_OUTPUT

      - name: 이메일 알림 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: HanAI Finance Monitor
          subject: ${{ steps.report.outputs.title }}
          html_body: |
            <html>
            <body style="font-family:Arial,sans-serif;padding:20px;max-width:800px;margin:0 auto;">
              <h2 style="color:#2c3e50;border-bottom:2px solid #3498db;padding-bottom:10px;">
                Weekly Finance Regulation Brief
              </h2>
              <div style="background:#f8f9fa;padding:20px;border-radius:8px;white-space:pre-wrap;line-height:1.8;">
                ${{ steps.report.outputs.body }}
              </div>
              <br>
              <a href="https://github.com/tojidi-debug/HanAI/issues"
                style="background-color:#3498db;color:white;padding:12px 24px;text-decoration:none;border-radius:5px;display:inline-block;">
                GitHub Issues
              </a>
              <br><br>
              <p style="color:#888;font-size:12px;">Auto-generated by GitHub Actions</p>
            </body>
            </html>

      - name: GitHub 알림 생성
        run: |
          echo "::notice title=Brief Ready::Issues tab updated!"

