name: Gemini 금융규정 모니터링

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 패키지 설치
        run: pip install google-generativeai

      - name: Gemini API 호출 및 Issue 생성
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/gemini_report.py

      - name: 이메일 알림 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: HanAI 금융규정 모니터링
          subject: "[주간브리핑] 금융규정 변경사항이 업데이트되었습니다"
          html_body: |
            <html>
            <body style="font-family:Arial,sans-serif;padding:20px;">
              <h2 style="color:#2c3e50;">주간 금융규정 브리핑 알림</h2>
              <p>안녕하세요,</p>
              <p>이번 주 금융규정 변경사항 브리핑이 생성되었습니다.</p>
              <br>
              <a href="https://github.com/tojidi-debug/HanAI/issues"
                style="background-color:#3498db;color:white;padding:12px 24px;text-decoration:none;border-radius:5px;">
                브리핑 보러가기
              </a>
              <br><br>
              <p style="color:#888;font-size:12px;">본 메일은 GitHub Actions에 의해 자동 발송되었습니다.</p>
            </body>
            </html>
```

---

## 순서
```
① 앱 비밀번호 재발급 (16자리)
② GMAIL_APP_PASSWORD Secret 업데이트
③ YAML 파일 수정 (content_type → html_body)
④ Run workflow 재실행

      - name: GitHub 알림 생성
        run: |
          echo "::notice title=주간브리핑 생성 완료::Issues 탭을 확인하세요!"
