name: 배포 후 페이지 헬스체크

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: GitHub Pages 배포 대기
        run: sleep 90

      - name: 주요 페이지 상태 확인
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pages=(
            "https://tojidi-debug.github.io/HanAI/"
            "https://tojidi-debug.github.io/HanAI/admin.html"
            "https://tojidi-debug.github.io/HanAI/flow.html"
            "https://tojidi-debug.github.io/HanAI/aihome.html"
          )

          FAILED=""
          for url in "${pages[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$url → HTTP $status"
            if [ "$status" != "200" ]; then
              FAILED="$FAILED\n- $url (HTTP $status)"
            fi
          done

          if [ -n "$FAILED" ]; then
            gh issue create \
              --title "🚨 배포 오류 감지 $(date '+%Y-%m-%d %H:%M')" \
              --body "$(printf '아래 페이지에서 문제가 감지됐습니다:\n'"$FAILED")" \
              --label "bug"
            echo "❌ 오류 페이지 발견 → Issue 생성됨"
          else
            echo "✅ 모든 페이지 정상"
          fi
```

---

## 수정 후 테스트
```
Actions 탭
→ "Gemini 금융규정 모니터링"
→ "Run workflow"
→ 1~2분 대기
→ Issues 탭 확인!
