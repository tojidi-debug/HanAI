name: 배포 후 페이지 헬스체크

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: GitHub Pages 배포 대기
        run: sleep 90

      - name: 주요 페이지 상태 확인
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pages=(
            "https://tojidi-debug.github.io/HanAI/"
            "https://tojidi-debug.github.io/HanAI/admin.html"
            "https://tojidi-debug.github.io/HanAI/flow.html"
            "https://tojidi-debug.github.io/HanAI/aihome.html"
          )
          FAILED=""
          for url in "${pages[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$url HTTP $status"
            if [ "$status" != "200" ]; then
              FAILED="$FAILED $url(HTTP $status)"
            fi
          done
          if [ -n "$FAILED" ]; then
            gh issue create \
              --title "배포 오류 감지 $(date '+%Y-%m-%d %H:%M')" \
              --body "오류 페이지: $FAILED"
            echo "오류 페이지 발견"
          else
            echo "모든 페이지 정상"
          fi
